name: PHPUnit Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: juan123
          MYSQL_DATABASE: control_asistencias_qr
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    strategy:
      matrix:
        php-version: [8.0]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo_mysql
          coverage: xdebug

      - name: Validate Composer
        run: composer validate

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

    
      - name: Initialize Database Schema
        run: |
          if [ -f "schema.sql" ]; then
            mysql -h 127.0.0.1 -u root -pjuan123 control_asistencias_qr < schema.sql
          elif [ -f "database.sql" ]; then
            mysql -h 127.0.0.1 -u root -pjuan123 control_asistencias_qr < database.sql
          else
            echo "No se encontró archivo SQL. Las tablas se asumen preexistentes."
          fi

      
      - name: Run PHPUnit
        run: vendor/bin/phpunit --configuration phpunit.xml
        env:
          DB_HOST: 127.0.0.1
          DB_PASSWORD: juan123

